<html lang="zh-CN">

<meta charset="UTF-8">

<title>晚餐 · 7天循环</title>

<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>

    --leaf: #6BB572; --leaf-soft: rgba(107,181,114,.14); --deep: #28543A;
    --accent: #F29E61; --card: rgba(255,255,255,.88);
    --fish: #5B9BD5; --chicken: #E8A838; --beef: #D4605A;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; }
  body {
    font-family: -apple-system,"PingFang SC","Helvetica Neue",sans-serif;
    color: var(--deep);
    background: linear-gradient(to bottom,#F5FAF0 0%,#C9E6CC 100%);
    background-attachment: fixed;
    -webkit-user-select:none; user-select:none; overflow-x:hidden;
  }
  .bg-leaf { position:fixed; z-index:0; pointer-events:none; width:260px; opacity:.08; }
  .bg-leaf.a { top:-60px; right:-50px; transform:rotate(-20deg); }
  .bg-leaf.b { bottom:40px; left:-70px; transform:rotate(150deg); opacity:.10; }
  #screen {
    position:relative; z-index:1; max-width:580px; margin:0 auto;

  }
  h1 { font-size:28px; font-weight:800; margin:6px 0 2px; }
  .subtitle { font-size:17px; color:rgba(40,84,58,.6); margin-bottom:18px; }
  h2 { font-size:17px; margin:0 0 8px; }

  /* === day header === */
  .day-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .day-label { font-size:15px; font-weight:700; color:#fff; padding:4px 14px; border-radius:20px; }
  .day-label.fish { background:var(--fish); }
  .day-label.chicken { background:var(--chicken); }
  .day-label.beef { background:var(--beef); }
  .edit-btn {
    margin-left:auto; width:34px; height:34px; border-radius:50%;
    border:none; background:rgba(255,255,255,.85); cursor:pointer;
    font-size:16px; display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 6px rgba(0,0,0,.06);
  }
  .back-btn {
    display:flex; align-items:center; gap:4px; border:none; background:none;
    font-size:16px; font-weight:600; color:var(--leaf); cursor:pointer;
    padding:0; margin-bottom:14px; font-family:inherit;
  }

  /* === dish card === */
  .dish-card {
    background:var(--card); border-radius:var(--radius);
    padding:16px 18px; margin-bottom:10px;
    box-shadow: 0 3px 12px rgba(107,181,114,.10);
  }
  .dish-card .title-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .dish-card .emoji { font-size:22px; }
  .dish-card .dish-name { font-size:17px; font-weight:700; }
  .dish-card .ingredients { font-size:14px; color:rgba(40,84,58,.65); line-height:1.6; }
  .dish-card .how {
    font-size:13px; color:rgba(40,84,58,.5); margin-top:6px; padding-top:6px;
    border-top:1px dashed rgba(107,181,114,.25); line-height:1.5;
  }
  .dish-card .how::before { content:"👨‍🍳 "; font-size:12px; }

  /* === edit fields === */
  .edit-card {
    background:var(--card); border-radius:var(--radius);
    padding:14px; margin-bottom:10px;
    box-shadow: 0 3px 12px rgba(107,181,114,.10);
  }
  .edit-card .row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .edit-card .row:last-child { margin-bottom:0; }
  .edit-card input, .edit-card textarea {
    width:100%; border:1px solid rgba(107,181,114,.3); border-radius:10px;
    padding:8px 10px; font-size:14px; font-family:inherit;
    color:var(--deep); background:#fff;
    -webkit-user-select:text; user-select:text;
  }
  .edit-card .e-emoji { width:44px; text-align:center; font-size:20px; padding:4px; }
  .edit-card .e-name { font-weight:700; font-size:15px; }
  .edit-card textarea { resize:vertical; min-height:32px; }
  .edit-card .del-dish {
    flex:0 0 auto; width:30px; height:30px; border-radius:50%;
    border:none; background:rgba(242,158,97,.15); color:var(--accent);
    font-size:16px; cursor:pointer;
  }
  .edit-card .drag-handle { color:rgba(40,84,58,.3); cursor:grab; font-size:18px; }
  .add-btn-row {
    display:flex; gap:6px; margin-bottom:18px;
  }
  .btn {
    border:none; border-radius:12px; padding:10px 20px;
    font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .btn.primary { background:var(--leaf); color:#fff; }
  .btn.outline { background:transparent; color:var(--leaf); border:2px solid var(--leaf); }
  .btn.danger { background:rgba(212,96,90,.12); color:var(--beef); }
  .btn.small { padding:6px 14px; font-size:13px; }
  .btn-icon {
    width:36px; height:36px; border-radius:50%; border:none;
    font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .btn-icon.green { background:var(--leaf); color:#fff; }
  .btn-icon:disabled { opacity:.4; }

  /* === nutrition bar === */
  .nutrition-bar { display:flex; gap:8px; margin-top:10px; }
  .nut { flex:1; text-align:center; background:rgba(107,181,114,.08); border-radius:10px; padding:8px 4px; }
  .nut .val { font-size:18px; font-weight:800; color:var(--deep); }
  .nut .label { font-size:11px; color:rgba(40,84,58,.55); margin-top:1px; }
  .nut-row { display:flex; gap:6px; }
  .nut-row .nut input { width:100%; text-align:center; border:none; background:transparent; font-size:16px; font-weight:800; color:var(--deep); padding:4px; }
  .nut-row .nut { padding:6px 4px; }

  /* === status === */
  .status { display:inline-flex; align-items:center; gap:4px; font-size:14px; font-weight:700; margin-top:8px; }
  .status.pass { color:#6BB572; }
  .status.warn { color:#E8A838; }
  .modified { font-size:11px; color:var(--accent); font-weight:600; }

  /* === summary table === */
  .summary-table { width:100%; border-collapse:collapse; background:var(--card); border-radius:var(--radius); overflow:hidden; box-shadow:0 3px 12px rgba(107,181,114,.10); }
  .summary-table th { background:var(--leaf); color:#fff; padding:10px 6px; font-size:12px; font-weight:700; }
  .summary-table td { padding:10px 6px; text-align:center; font-size:13px; font-weight:600; border-bottom:1px solid rgba(107,181,114,.12); }
  .summary-table td.day { text-align:left; padding-left:12px; font-weight:700; }
  .summary-table .pass { color:#6BB572; font-weight:800; }
  .summary-table .warn { color:#E8A838; font-weight:800; }
  .summary-table .meat { font-size:14px; }

  /* === shop === */
  .shop-list { list-style:none; padding:0; margin:0; }
  .shop-list li { display:flex; align-items:center; gap:8px; padding:10px 14px; margin-bottom:6px; background:var(--card); border-radius:12px; font-size:15px; font-weight:600; box-shadow:0 2px 8px rgba(107,181,114,.08); }
  .shop-list .qty { margin-left:auto; color:var(--accent); font-weight:800; font-size:14px; }

  /* === note === */
  .note { background:rgba(242,158,97,.12); border-left:3px solid var(--accent); border-radius:0 12px 12px 0; padding:12px 14px; margin-bottom:8px; font-size:14px; line-height:1.6; color:rgba(40,84,58,.85); }
  .note::before { content:"⚠️ "; }

  /* === tabbar === */
  #tabbar {
    position:fixed; left:0; right:0; bottom:0; z-index:2;
    display:flex; justify-content:center; gap:0;
    padding:6px 0 calc(env(safe-area-inset-bottom) + 6px);
    background:rgba(245,250,240,.92);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-top:1px solid rgba(107,181,114,.16);
  }
  .tab { flex:1; max-width:150px; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; color:rgba(40,84,58,.4); font-size:11px; font-weight:700; padding:4px; }
  .tab svg { width:24px; height:24px; }
  .tab.active { color:var(--leaf); }
  .page { padding-bottom:70px; }

  .meta-label { font-size:12px; font-weight:700; color:rgba(40,84,58,.45); margin:16px 0 6px; text-transform:uppercase; letter-spacing:.5px; }
  .section-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .section-row label { font-size:14px; font-weight:600; min-width:50px; }
  .section-row input, .section-row select {
    border:1px solid rgba(107,181,114,.3); border-radius:10px;
    padding:8px 10px; font-size:14px; font-family:inherit;
    background:#fff; -webkit-user-select:text; user-select:text;
  }
  select { color:var(--deep); }
</style>
</head>

// ============================================================
// EDIT STORAGE
// ============================================================

const EDIT_KEY = "dinner_custom_v1";

function loadEdits() {
  try { return JSON.parse(localStorage.getItem(EDIT_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveEdits(edits) { localStorage.setItem(EDIT_KEY, JSON.stringify(edits)); }

// merge custom edits onto defaults, returning a full 7-day array
function getMeals() {
  const edits = loadEdits();
  return DEFAULTS.map((d,i) => {
    if (!edits[i]) return {...d, dishes:d.dishes.map(x=>({...x})), _custom:false};
    return {...d, ...edits[i], dishes:(edits[i].dishes||d.dishes).map(x=>({...x})), _custom:true};
  });
}
function isCustom(dayIndex) { return !!loadEdits()[dayIndex]; }

// ============================================================

let tab = "today", editing = null;
let MEALS = getMeals(); // refreshed on render

function esc(s) { return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function todayIndex() { return (new Date().getDay()+6)%7; }
function dateStr() {
  const d = new Date();
  return `${d.getMonth()+1}月${d.getDate()}日 星期${"日一二三四五六"[d.getDay()]}`;
}
function typeClass(t) { return t==="fish"?"fish":t==="chicken"?"chicken":"beef"; }
function typeLabel(t) { return t==="fish"?"🐟 鱼":t==="chicken"?"🐔 鸡":"🥩 牛"; }
function proStatus(p) {
  return p>=100
    ? '<span class="status pass">✅ 蛋白 '+p+'g · 达标</span>'
    : '<span class="status warn">⚠️ 蛋白 '+p+'g · 差'+(100-p)+'g</span>';
}

function renderDayCards(m) {
  return m.dishes.map(d=>`
    <div class="dish-card">
      <div class="title-row"><span class="emoji">${d.emoji}</span><span class="dish-name">${esc(d.name)}</span></div>
      <div class="ingredients">${esc(d.ing)}</div>
      <div class="how">${esc(d.how)}</div>
    </div>
  `).join("") + `
    <div class="nutrition-bar">
      <div class="nut"><div class="val">${m.dinnerCal}</div><div class="label">晚餐 千卡</div></div>
      <div class="nut"><div class="val">${m.dinnerPro}g</div><div class="label">晚餐 蛋白</div></div>
      <div class="nut"><div class="val">${m.totalPro}g</div><div class="label">全天 蛋白</div></div>
      <div class="nut"><div class="val">${m.totalCal}</div><div class="label">全天 千卡</div></div>
    </div>`;
}

// ============================================================
// PAGES
// ============================================================

function renderToday() {
  MEALS = getMeals();
  const m = MEALS[todayIndex()];
  return `<h1>今天吃什么</h1>
    <div class="subtitle">${dateStr()}</div>
    ${renderDayCards(m)}
    ${m.note ? `<div class="note">${esc(m.note)}</div>` : ""}
    <div style="margin-top:10px">${proStatus(m.totalPro)} · 全天热量 ${m.totalCal} 千卡</div>`;
}

function renderWeek() {
  MEALS = getMeals();
  return `<h1>7 天循环</h1>
    <div class="subtitle">🐟→🐔→🥩→🐔→🐟→🐔→🥩</div>
    ${MEALS.map((m,i)=>`
      <div style="margin-bottom:20px">
        <div class="day-header">
          <span class="day-label ${typeClass(m.type)}">${WEEKDAYS[i]} · ${typeLabel(m.type)} ${m.tag}${m._custom?' 🔧':''}</span>
          <button class="edit-btn" onclick="openEdit(${i})" title="编辑">✏️</button>
        </div>
        ${m.dishes.map(d=>`
          <div class="dish-card">
            <div class="title-row"><span class="emoji">${d.emoji}</span><span class="dish-name">${esc(d.name)}</span></div>
            <div class="ingredients">${esc(d.ing)}</div>
            <div class="how">${esc(d.how)}</div>
          </div>
        `).join("")}
        <div class="nutrition-bar">
          <div class="nut"><div class="val">${m.dinnerCal}</div><div class="label">晚餐 千卡</div></div>
          <div class="nut"><div class="val">${m.dinnerPro}g</div><div class="label">晚餐 蛋白</div></div>
          <div class="nut"><div class="val">${m.totalPro}g</div><div class="label">全天 蛋白</div></div>
          <div class="nut"><div class="val">${m.totalCal}</div><div class="label">全天 千卡</div></div>
        </div>
        ${m.totalPro>=100?'<div class="status pass">✅ 达标</div>':'<div class="status warn">⚠️ 差 '+(100-m.totalPro)+'g</div>'}
        ${m.note?`<div class="note">${esc(m.note)}</div>`:""}
      </div>
    `).join("")}`;
}

function renderSummary() {
  MEALS = getMeals();
  const avgPro = Math.round(MEALS.reduce((s,m)=>s+m.totalPro,0)/7);
  const avgCal = Math.round(MEALS.reduce((s,m)=>s+m.totalCal,0)/7);
  const rows = MEALS.map((m,i)=>`
    <tr>
      <td class="day">${WEEKDAYS[i]}</td>
      <td class="meat"><span class="day-label ${typeClass(m.type)}" style="font-size:14px;padding:2px 8px;display:inline-block">${typeLabel(m.type)} ${m.tag}</span></td>
      <td>${m.dinnerPro}g</td>
      <td class="${m.totalPro>=100?'pass':'warn'}">${m.totalPro}g</td>
      <td class="${m.totalPro>=100?'pass':'warn'}">${m.totalPro>=100?'✅':'⚠️'}</td>
      <td>${m.totalCal}</td>
    </tr>
  `).join("");
  return `<h1>7 天汇总</h1>
    <div class="subtitle">均值：蛋白 ${avgPro}g · 热量 ${avgCal} 千卡</div>
    <table class="summary-table">
      <thead><tr><th>日期</th><th>主蛋白</th><th>晚餐蛋白</th><th>全天蛋白</th><th>达标</th><th>全天热量</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:16px">
      <h2>注意</h2>
      ${NOTES.map(n=>`<div class="note">${esc(n)}</div>`).join("")}
    </div>`;
}

function renderShop() {
  return `<h1>每周采购清单</h1>
    <div class="subtitle">按这个买，一周刚好用完</div>
    <ul class="shop-list">
      ${SHOP.map(s=>`<li><span>${s.emoji}</span> ${esc(s.name)} <span class="qty">${esc(s.qty)}</span></li>`).join("")}
    </ul>
    <div class="note" style="margin-top:12px">调料你已有油、盐、生抽、料酒。黑胡椒碎（5块钱）建议补齐 — 牛排的灵魂。</div>`;
}

// ============================================================
// EDIT MODE
// ============================================================

function openEdit(day) {
  editing = day;
  MEALS = getMeals();
  render();
  window.scrollTo(0,0);
}

function closeEdit() {
  editing = null;
  render();
}

function resetDay(day) {
  if (!confirm('恢复 ' + WEEKDAYS[day] + ' 到默认方案？你的修改会丢失。')) return;
  const edits = loadEdits();
  delete edits[day];
  saveEdits(edits);
  MEALS = getMeals();
  render();
}

function saveEdit(day) {
  const m = MEALS[day];
  const container = document.getElementById("edit-form");
  if (!container) return;

  // read dishes
  const dishCards = container.querySelectorAll(".edit-card");
  const dishes = [];
  dishCards.forEach(card=>{
    const emoji = card.querySelector(".e-emoji").value;
    const name = card.querySelector(".e-name").value;
    const ing = card.querySelector('[data-field="ing"]').value;
    const how = card.querySelector('[data-field="how"]').value;
    if (name.trim()) dishes.push({emoji, name, ing, how});
  });

  // read nutrition
  const dinnerCal = +container.querySelector('[data-field="dinnerCal"]').value || 0;
  const dinnerPro = +container.querySelector('[data-field="dinnerPro"]').value || 0;
  const totalPro = +container.querySelector('[data-field="totalPro"]').value || 0;
  const totalCal = +container.querySelector('[data-field="totalCal"]').value || 0;
  const tag = container.querySelector('[data-field="tag"]').value;
  const type = container.querySelector('[data-field="type"]').value;
  const note = container.querySelector('[data-field="note"]').value;

  const edits = loadEdits();
  edits[day] = { dishes, dinnerCal, dinnerPro, totalPro, totalCal, type, tag, note };
  saveEdits(edits);
  editing = null;
  MEALS = getMeals();
  render();
  alert('✅ ' + WEEKDAYS[day] + ' 已保存！');
}

function addDish(day) {
  const container = document.getElementById("dish-list");
  if (!container) return;
  const i = container.querySelectorAll(".edit-card").length;
  const div = document.createElement("div");
  div.className = "edit-card";
  div.innerHTML = `
    <div class="row"><span class="drag-handle">☰</span>
      <input class="e-emoji" value="🍽️" style="width:44px;text-align:center;font-size:20px;padding:4px">
      <input class="e-name" value="新菜品" placeholder="菜名">
      <button class="del-dish" onclick="this.closest('.edit-card').remove()">✕</button>
    </div>
    <div class="row"><input data-field="ing" value="" placeholder="食材和用量，如：鸡排 2片(200g)"></div>
    <div class="row"><textarea data-field="how" placeholder="做法，如：生抽+料酒腌5分钟，中火煎至两面金黄" rows="2" style="width:100%"></textarea></div>
  `;
  container.appendChild(div);
  div.querySelector(".e-name").focus();
}

function renderEdit(day) {
  const m = MEALS[day];
  const edits = loadEdits();
  const hasCustom = !!edits[day];
  return `
    <button class="back-btn" onclick="closeEdit()">‹ 返回一周</button>
    <h1>编辑 ${WEEKDAYS[day]}</h1>
    <div class="subtitle">修改完点底部「保存」</div>

    <div class="meta-label">分类</div>
    <div class="section-row">
      <select data-field="type" style="flex:1">
        <option value="fish" ${m.type==='fish'?'selected':''}>🐟 鱼</option>
        <option value="chicken" ${m.type==='chicken'?'selected':''}>🐔 鸡</option>
        <option value="beef" ${m.type==='beef'?'selected':''}>🥩 牛</option>
      </select>
      <input data-field="tag" value="${esc(m.tag||'')}" placeholder="做法标签，如：煎、水煮" style="flex:1">
    </div>

    <div class="meta-label">菜品 <span style="font-weight:400;color:rgba(40,84,58,.4)">(${m.dishes.length} 道)</span></div>
    <div id="dish-list">
      ${m.dishes.map(d=>`
        <div class="edit-card">
          <div class="row"><span class="drag-handle">☰</span>
            <input class="e-emoji" value="${esc(d.emoji)}" style="width:44px;text-align:center;font-size:20px;padding:4px">
            <input class="e-name" value="${esc(d.name)}" placeholder="菜名">
            <button class="del-dish" onclick="this.closest('.edit-card').remove()">✕</button>
          </div>
          <div class="row"><input data-field="ing" value="${esc(d.ing)}" placeholder="食材和用量"></div>
          <div class="row"><textarea data-field="how" placeholder="做法" rows="2" style="width:100%">${esc(d.how)}</textarea></div>
        </div>
      `).join("")}
    </div>
    <div class="add-btn-row" style="margin-top:8px">
      <button class="btn outline small" onclick="addDish(${day})">+ 添加一道菜</button>
    </div>

    <div class="meta-label">营养数据</div>
    <div class="nut-row">
      <div class="nut"><div class="label">晚餐 千卡</div><input data-field="dinnerCal" type="number" value="${m.dinnerCal}" style="text-align:center;border:none;background:transparent;font-size:16px;font-weight:800;color:var(--deep);width:100%;padding:4px"></div>
      <div class="nut"><div class="label">晚餐 蛋白g</div><input data-field="dinnerPro" type="number" value="${m.dinnerPro}" style="text-align:center;border:none;background:transparent;font-size:16px;font-weight:800;color:var(--deep);width:100%;padding:4px"></div>
      <div class="nut"><div class="label">全天 蛋白g</div><input data-field="totalPro" type="number" value="${m.totalPro}" style="text-align:center;border:none;background:transparent;font-size:16px;font-weight:800;color:var(--deep);width:100%;padding:4px"></div>
      <div class="nut"><div class="label">全天 千卡</div><input data-field="totalCal" type="number" value="${m.totalCal}" style="text-align:center;border:none;background:transparent;font-size:16px;font-weight:800;color:var(--deep);width:100%;padding:4px"></div>
    </div>

    <div class="meta-label">备注</div>
    <textarea data-field="note" placeholder="如：巴沙鱼自带42g蛋白偏高..." rows="2" style="width:100%;border:1px solid rgba(107,181,114,.3);border-radius:10px;padding:8px 10px;font-size:14px;font-family:inherit;background:#fff;-webkit-user-select:text;user-select:text">${esc(m.note||'')}</textarea>

    <div style="display:flex;gap:8px;margin-top:18px">
      <button class="btn primary" onclick="saveEdit(${day})" style="flex:1">💾 保存</button>
      ${hasCustom ? `<button class="btn danger" onclick="resetDay(${day})" style="flex:1">↩ 恢复默认</button>` : ''}
    </div>
    <div id="edit-form" style="display:none"></div>
  `;
}

// ============================================================
// MAIN RENDER
// ============================================================

function render() {
  const s = document.getElementById("screen");
  if (editing !== null) {
    s.innerHTML = '<div class="page">' + renderEdit(editing) + '</div>';
    // copy edit form data on save by scanning actual DOM
    const dummy = document.createElement("div");
    dummy.id = "edit-form";
    s.appendChild(dummy);
  } else if (tab === "today") {
    s.innerHTML = renderToday();
  } else if (tab === "week") {
    s.innerHTML = '<div class="page">' + renderWeek() + '</div>';
  } else if (tab === "summary") {
    s.innerHTML = '<div class="page">' + renderSummary() + '</div>';
  } else if (tab === "shop") {
    s.innerHTML = '<div class="page">' + renderShop() + '</div>';
  }
  document.querySelectorAll(".tab").forEach(b=>
    b.classList.toggle("active", b.dataset.tab === tab));
  window.scrollTo(0,0);
}

// tab clicks
document.querySelectorAll(".tab").forEach(b=>
  b.addEventListener("click", ()=>{
    tab = b.dataset.tab;
    editing = null;
    MEALS = getMeals();
    render();
  }));

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", ()=>
    navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
