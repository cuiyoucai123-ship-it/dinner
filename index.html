<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>晚餐 · 7天循环</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="晚餐">
<meta name="theme-color" content="#6BB572">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">

<style>
  :root {
    --leaf: #6BB572;
    --leaf-soft: rgba(107,181,114,.14);
    --deep: #28543A;
    --accent: #F29E61;
    --card: rgba(255,255,255,.88);
    --fish: #5B9BD5;
    --chicken: #E8A838;
    --beef: #D4605A;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    color: var(--deep);
    background: linear-gradient(to bottom, #F5FAF0 0%, #C9E6CC 100%);
    background-attachment: fixed;
    -webkit-user-select: none; user-select: none;
    overflow-x: hidden;
  }

  /* === 背景叶子 === */
  .bg-leaf {
    position: fixed; z-index: 0; pointer-events: none;
    width: 260px; opacity: .08;
  }
  .bg-leaf.a { top: -60px; right: -50px; transform: rotate(-20deg); }
  .bg-leaf.b { bottom: 40px; left: -70px; transform: rotate(150deg); opacity: .10; }

  /* === 主区域 === */
  #screen {
    position: relative; z-index: 1;
    max-width: 580px; margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 14px) 16px 60px;
    min-height: 100%;
  }

  /* === 顶部 === */
  h1 { font-size: 28px; font-weight: 800; margin: 6px 0 2px; }
  .subtitle { font-size: 17px; color: rgba(40,84,58,.6); margin-bottom: 18px; }

  /* === Tab === */
  .segmented {
    display: flex; background: white; border-radius: 14px;
    padding: 3px; margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .segmented button {
    flex: 1; border: none; background: none; padding: 10px 0;
    font-size: 15px; font-weight: 700; color: rgba(40,84,58,.45);
    border-radius: 11px; cursor: pointer;
    font-family: inherit;
  }
  .segmented button.active {
    background: var(--leaf); color: #fff;
  }

  /* === 日期标题条 === */
  .day-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .day-label {
    font-size: 15px; font-weight: 700; color: #fff;
    padding: 4px 14px; border-radius: 20px;
  }
  .day-label.fish { background: var(--fish); }
  .day-label.chicken { background: var(--chicken); }
  .day-label.beef { background: var(--beef); }
  .tag {
    font-size: 12px; font-weight: 600; color: rgba(40,84,58,.6);
    padding: 3px 10px; background: rgba(255,255,255,.7);
    border-radius: 20px;
  }

  /* === 菜卡片 === */
  .dish-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 10px;
    box-shadow: 0 3px 12px rgba(107,181,114,.10);
  }
  .dish-card .title-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .dish-card .emoji { font-size: 22px; }
  .dish-card .dish-name { font-size: 17px; font-weight: 700; }
  .dish-card .ingredients {
    font-size: 14px; color: rgba(40,84,58,.65);
    line-height: 1.6;
  }
  .dish-card .how {
    font-size: 13px; color: rgba(40,84,58,.5);
    margin-top: 6px; padding-top: 6px;
    border-top: 1px dashed rgba(107,181,114,.25);
    line-height: 1.5;
  }
  .dish-card .how::before { content: "👨‍🍳 "; font-size: 12px; }

  /* === 营养栏 === */
  .nutrition-bar {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .nut {
    flex: 1; text-align: center;
    background: rgba(107,181,114,.08); border-radius: 10px;
    padding: 8px 4px;
  }
  .nut .val { font-size: 18px; font-weight: 800; color: var(--deep); }
  .nut .label { font-size: 11px; color: rgba(40,84,58,.55); margin-top: 1px; }

  /* === 达标状态 === */
  .status {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 14px; font-weight: 700; margin-top: 8px;
  }
  .status.pass { color: #6BB572; }
  .status.warn { color: #E8A838; }

  /* === 汇总表 === */
  .summary-table {
    width: 100%; border-collapse: collapse;
    background: var(--card); border-radius: var(--radius);
    overflow: hidden; box-shadow: 0 3px 12px rgba(107,181,114,.10);
  }
  .summary-table th {
    background: var(--leaf); color: #fff;
    padding: 10px 6px; font-size: 12px; font-weight: 700;
  }
  .summary-table td {
    padding: 10px 6px; text-align: center;
    font-size: 13px; font-weight: 600;
    border-bottom: 1px solid rgba(107,181,114,.12);
  }
  .summary-table td.day { text-align: left; padding-left: 12px; font-weight: 700; }
  .summary-table .pass { color: #6BB572; font-weight: 800; }
  .summary-table .warn { color: #E8A838; font-weight: 800; }
  .summary-table .meat { font-size: 14px; }

  /* === 采购清单 === */
  .shop-list {
    list-style: none; padding: 0; margin: 0;
  }
  .shop-list li {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; margin-bottom: 6px;
    background: var(--card); border-radius: 12px;
    font-size: 15px; font-weight: 600;
    box-shadow: 0 2px 8px rgba(107,181,114,.08);
  }
  .shop-list .qty { margin-left: auto; color: var(--accent); font-weight: 800; font-size: 14px; }

  /* === 注意事项 === */
  .note {
    background: rgba(242,158,97,.12); border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0; padding: 12px 14px;
    margin-bottom: 8px; font-size: 14px; line-height: 1.6;
    color: rgba(40,84,58,.85);
  }
  .note::before { content: "⚠️ "; }

  /* === 底部导航 === */
  #tabbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 2;
    display: flex; justify-content: center; gap: 0;
    padding: 6px 0 calc(env(safe-area-inset-bottom) + 6px);
    background: rgba(245,250,240,.92);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(107,181,114,.16);
  }
  .tab {
    flex: 1; max-width: 150px; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: rgba(40,84,58,.4); font-size: 11px; font-weight: 700; padding: 4px;
  }
  .tab svg { width: 24px; height: 24px; }
  .tab.active { color: var(--leaf); }

  /* === 常驻数据页 padding === */
  .page { padding-bottom: 70px; }
</style>
</head>
<body>

<!-- 背景叶子 -->

// ============================================================
// RENDER
// ============================================================

let tab = "today";

function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function todayIndex() { return (new Date().getDay() + 6) % 7; }

function dateStr() {
  const d = new Date();
  return `${d.getMonth()+1}月${d.getDate()}日 星期${"日一二三四五六"[d.getDay()]}`;
}

function typeClass(t) { return t === "fish" ? "fish" : t === "chicken" ? "chicken" : "beef"; }
function typeLabel(t) { return t === "fish" ? "🐟 鱼" : t === "chicken" ? "🐔 鸡" : "🥩 牛"; }
function proStatus(p) {
  return p >= 100 ? '<span class="status pass">✅ 蛋白 ' + p + 'g · 达标</span>'
    : '<span class="status warn">⚠️ 蛋白 ' + p + 'g · 差' + (100-p) + 'g</span>';
}

function renderToday() {
  const m = MEALS[todayIndex()];
  return `<h1>今天吃什么</h1>
    <div class="subtitle">${dateStr()}</div>
    ${renderDayCards(m)}
    ${m.note ? `<div class="note">${esc(m.note)}</div>` : ""}
    <div style="margin-top:10px">${proStatus(m.totalPro)} · 全天热量 ${m.totalCal} 千卡</div>`;
}

function renderWeek() {

    <div class="subtitle">🐟→🐔→🥩→🐔→🐟→🐔→🥩</div>
    ${MEALS.map((m,i) =>
      `<div style="margin-bottom:20px">
        <div class="day-header">
          <span class="day-label ${typeClass(m.type)}">${WEEKDAYS[i]} · ${typeLabel(m.type)} ${m.tag}</span>
        </div>
        ${m.dishes.map(d => `
          <div class="dish-card">
            <div class="title-row"><span class="emoji">${d.emoji}</span><span class="dish-name">${esc(d.name)}</span></div>
            <div class="ingredients">${esc(d.ing)}</div>
            <div class="how">${esc(d.how)}</div>
          </div>
        `).join("")}
        <div class="nutrition-bar">
          <div class="nut"><div class="val">${m.dinnerCal}</div><div class="label">晚餐 千卡</div></div>
          <div class="nut"><div class="val">${m.dinnerPro}g</div><div class="label">晚餐 蛋白</div></div>
          <div class="nut"><div class="val">${m.totalPro}g</div><div class="label">全天 蛋白</div></div>
          <div class="nut"><div class="val">${m.totalCal}</div><div class="label">全天 千卡</div></div>
        </div>
        ${m.totalPro >= 100
          ? '<div class="status pass">✅ 达标</div>'
          : '<div class="status warn">⚠️ 差 '+(100-m.totalPro)+'g</div>'}
        ${m.note ? `<div class="note">${esc(m.note)}</div>` : ""}
      </div>`
    ).join("")}`;
}

function renderSummary() {
  const avgPro = Math.round(MEALS.reduce((s,m)=>s+m.totalPro,0)/7);
  const avgCal = Math.round(MEALS.reduce((s,m)=>s+m.totalCal,0)/7);
  const rows = MEALS.map((m,i) =>
    `<tr>
      <td class="day" style="font-weight:700">${WEEKDAYS[i]}</td>
      <td class="meat"><span class="day-label ${typeClass(m.type)}" style="font-size:14px;padding:2px 8px;display:inline-block">${typeLabel(m.type)} ${m.tag}</span></td>
      <td>${m.dinnerPro}g</td>
      <td class="${m.totalPro >= 100 ? 'pass' : 'warn'}">${m.totalPro}g</td>
      <td class="${m.totalPro >= 100 ? 'pass' : 'warn'}">${m.totalPro >= 100 ? '✅' : '⚠️'}</td>
      <td>${m.totalCal}</td>
    </tr>`
  ).join("");

  return `<h1>7 天汇总</h1>
    <div class="subtitle">均值：蛋白 ${avgPro}g · 热量 ${avgCal} 千卡</div>
    <table class="summary-table">
      <thead><tr>
        <th>日期</th><th>主蛋白</th><th>晚餐蛋白</th><th>全天蛋白</th><th>达标</th><th>全天热量</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:16px">
      <h2 style="font-size:17px;margin:0 0 8px">注意</h2>
      ${NOTES.map(n => `<div class="note">${esc(n)}</div>`).join("")}
    </div>`;
}

function renderShop() {
  return `<h1>每周采购清单</h1>
    <div class="subtitle">按这个买，一周刚好用完</div>
    <ul class="shop-list">
      ${SHOP.map(s =>
        `<li><span>${s.emoji}</span> ${esc(s.name)} <span class="qty">${esc(s.qty)}</span></li>`
      ).join("")}
    </ul>
    <div class="note" style="margin-top:12px">调料你已有油、盐、生抽、料酒。黑胡椒碎（5块钱）建议补齐 — 牛排的灵魂。</div>`;
}

function renderDayCards(m) {
  return m.dishes.map(d => `
    <div class="dish-card">
      <div class="title-row"><span class="emoji">${d.emoji}</span><span class="dish-name">${esc(d.name)}</span></div>
      <div class="ingredients">${esc(d.ing)}</div>
      <div class="how">${esc(d.how)}</div>
    </div>
  `).join("")
  + `<div class="nutrition-bar">
      <div class="nut"><div class="val">${m.dinnerCal}</div><div class="label">晚餐 千卡</div></div>
      <div class="nut"><div class="val">${m.dinnerPro}g</div><div class="label">晚餐 蛋白</div></div>
      <div class="nut"><div class="val">${m.totalPro}g</div><div class="label">全天 蛋白</div></div>
      <div class="nut"><div class="val">${m.totalCal}</div><div class="label">全天 千卡</div></div>
    </div>`;
}

function render() {
  const s = document.getElementById("screen");
  if (tab === "today")   s.innerHTML = renderToday();
  else if (tab === "week")  s.innerHTML = '<div class="page">' + renderWeek() + '</div>';
  else if (tab === "summary") s.innerHTML = '<div class="page">' + renderSummary() + '</div>';
  else if (tab === "shop") s.innerHTML = '<div class="page">' + renderShop() + '</div>';
  document.querySelectorAll(".tab").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab));
  window.scrollTo(0, 0);
}

document.querySelectorAll(".tab").forEach(b =>
  b.addEventListener("click", () => { tab = b.dataset.tab; render(); }));

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () =>
    navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
