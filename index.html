<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>晚餐</title>

<!-- 添加到主屏幕后像原生 App 一样全屏 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="晚餐">
<meta name="theme-color" content="#6BB572">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">

<style>
  :root {
    --leaf: #6BB572;
    --leaf-soft: rgba(107,181,114,.16);
    --deep: #28543A;
    --accent: #F29E61;
    --card: rgba(255,255,255,.85);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    color: var(--deep);
    background: linear-gradient(to bottom, #F5FAF0 0%, #C9E6CC 100%);
    background-attachment: fixed;
    -webkit-user-select: none; user-select: none;
    overflow-x: hidden;
  }
  /* 背景里飘的两片淡叶子 */
  .bg-leaf {
    position: fixed; z-index: 0; pointer-events: none;
    width: 240px; opacity: .09;
  }
  .bg-leaf.a { top: -60px; right: -40px; transform: rotate(-20deg); }
  .bg-leaf.b { bottom: 40px; left: -70px; transform: rotate(150deg); opacity: .12; }

  #screen {
    position: relative; z-index: 1;
    max-width: 560px; margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 16px) 18px 120px;
    min-height: 100%;
  }

  h1 { font-size: 30px; font-weight: 800; margin: 6px 0 2px; }
  .subtitle { font-size: 16px; font-weight: 500; color: rgba(40,84,58,.7); margin-bottom: 22px; }

  /* 今天页：菜卡片 */
  .card {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border-radius: 20px;
    padding: 16px; margin-bottom: 14px;
    box-shadow: 0 4px 14px rgba(107,181,114,.16);
  }
  .num {
    flex: 0 0 auto; width: 46px; height: 46px; border-radius: 50%;
    background: var(--leaf-soft); color: var(--leaf);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800;
  }
  .card .name { flex: 1; font-size: 19px; font-weight: 700; }
  .card .leaf-mini { width: 18px; height: 18px; opacity: .5; }

  .footer-tip { text-align: center; font-size: 14px; color: rgba(40,84,58,.6); margin-top: 18px; }
  .empty { text-align: center; padding: 60px 0; color: rgba(40,84,58,.65); }
  .empty .big { font-size: 52px; opacity: .5; }
  .empty .t1 { font-size: 18px; font-weight: 700; margin-top: 12px; }
  .empty .t2 { font-size: 14px; margin-top: 4px; }

  /* 设置页：每天一行 */
  .day-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 18px;
    padding: 18px 16px; margin-bottom: 12px;
    box-shadow: 0 3px 10px rgba(107,181,114,.12);
  }
  .day-row .wname { font-size: 18px; font-weight: 700; }
  .badge {
    font-size: 12px; font-weight: 700; color: #fff;
    background: var(--accent); padding: 3px 9px; border-radius: 20px;
  }
  .day-row .count { margin-left: auto; color: rgba(40,84,58,.55); font-size: 15px; }
  .day-row .chev { color: rgba(40,84,58,.4); font-size: 20px; }

  /* 编辑页 */
  .backbar {
    display: flex; align-items: center; gap: 4px;
    font-size: 17px; font-weight: 600; color: var(--leaf);
    background: none; border: none; padding: 0; margin-bottom: 16px; cursor: pointer;
  }
  .edit-row, .add-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 16px;
    padding: 10px 14px; margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(107,181,114,.1);
  }
  input.dish {
    flex: 1; border: none; background: transparent; outline: none;
    font-size: 17px; font-weight: 600; color: var(--deep);
    font-family: inherit; -webkit-user-select: text; user-select: text;
  }
  input.dish::placeholder { color: rgba(40,84,58,.4); font-weight: 500; }
  .icon-btn {
    flex: 0 0 auto; width: 34px; height: 34px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 20px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .del { background: rgba(242,158,97,.15); color: var(--accent); }
  .add { background: var(--leaf); color: #fff; font-size: 22px; }
  .add:disabled { opacity: .4; }
  .section-label { font-size: 13px; font-weight: 700; color: rgba(40,84,58,.5);
    margin: 22px 4px 8px; letter-spacing: .5px; }

  /* 底部标签栏 */
  #tabbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 2;
    display: flex; justify-content: center; gap: 8px;
    padding: 8px 0 calc(env(safe-area-inset-bottom) + 8px);
    background: rgba(245,250,240,.9);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(107,181,114,.18);
  }
  .tab {
    flex: 1; max-width: 180px; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: rgba(40,84,58,.45); font-size: 11px; font-weight: 600; padding: 4px;
  }
  .tab svg { width: 26px; height: 26px; }
  .tab.active { color: var(--leaf); }
</style>
</head>
<body>

<!-- 背景叶子 -->
<svg class="bg-leaf a" viewBox="0 0 100 100"><path d="M20 80 C20 40 60 20 80 20 C80 60 40 80 20 80 Z" fill="#3E8E5A"/></svg>
<svg class="bg-leaf b" viewBox="0 0 100 100"><path d="M20 80 C20 40 60 20 80 20 C80 60 40 80 20 80 Z" fill="#6BB572"/></svg>

<main id="screen"></main>

<nav id="tabbar">
  <button class="tab" data-tab="today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 11h18a9 9 0 0 1-18 0z"/><path d="M12 11V4M9 4v3M15 4v3"/>
    </svg>
    <span>今天</span>
  </button>
  <button class="tab" data-tab="settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/>
    </svg>
    <span>设置</span>
  </button>
</nav>

<script>
const WEEK = ["周一","周二","周三","周四","周五","周六","周日"];
const KEY = "weekMeals.v1";
const DEFAULT = [
  ["杂粮饭","西兰花炒虾仁","番茄豆腐汤"],
  ["糙米饭","清蒸鲈鱼","蒜蓉菠菜"],
  ["藜麦饭","彩椒鸡胸肉","紫菜蛋花汤"],
  ["蒸红薯","牛肉炖土豆","凉拌黄瓜"],
  ["全麦意面","番茄龙利鱼","白灼西兰花"],
  ["米饭","香煎三文鱼","蒜蓉生菜"],
  ["南瓜小米粥","白切鸡","清炒油麦菜"],
];
const LEAF_SVG = '<svg class="leaf-mini" viewBox="0 0 100 100"><path d="M20 80 C20 40 60 20 80 20 C80 60 40 80 20 80 Z" fill="#6BB572"/></svg>';

let week = load();
let tab = "today";
let editingDay = null;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY));
    if (Array.isArray(d) && d.length === 7) return d;
  } catch (e) {}
  return DEFAULT.map(a => a.slice());
}
function save() { localStorage.setItem(KEY, JSON.stringify(week)); }

function todayIndex() { return (new Date().getDay() + 6) % 7; }
function dateStr() {
  const d = new Date();
  return `${d.getMonth()+1}月${d.getDate()}日 星期${"日一二三四五六"[d.getDay()]}`;
}
function esc(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render() {
  const s = document.getElementById("screen");
  if (tab === "today") s.innerHTML = renderToday();
  else if (editingDay === null) s.innerHTML = renderSettings();
  else { s.innerHTML = renderEdit(editingDay); bindEdit(editingDay); }
  document.querySelectorAll(".tab").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab));
  window.scrollTo(0, 0);
}

function renderToday() {
  const meals = week[todayIndex()];
  let body;
  if (meals.length === 0) {
    body = `<div class="empty"><div class="big">🍽️</div>
      <div class="t1">今天还没安排菜单</div>
      <div class="t2">去「设置」里给今天加几道菜吧</div></div>`;
  } else {
    body = meals.map((m, i) =>
      `<div class="card"><div class="num">${i+1}</div>
       <div class="name">${esc(m)}</div>${LEAF_SVG}</div>`).join("") +
      `<div class="footer-tip">🌿 营养均衡，好好吃饭</div>`;
  }
  return `<h1>今天吃什么</h1><div class="subtitle">${dateStr()}</div>${body}`;
}

function renderSettings() {
  const ti = todayIndex();
  const rows = week.map((meals, i) =>
    `<div class="day-row" onclick="openDay(${i})">
       <span class="wname">${WEEK[i]}</span>
       ${i === ti ? '<span class="badge">今天</span>' : ''}
       <span class="count">${meals.length} 道</span>
       <span class="chev">›</span>
     </div>`).join("");
  return `<h1>一周晚餐</h1><div class="subtitle">点一天，编辑那天吃什么</div>${rows}`;
}

function renderEdit(day) {
  const rows = week[day].map((m, i) =>
    `<div class="edit-row">
       <input class="dish" data-i="${i}" value="${esc(m)}" placeholder="菜名">
       <button class="icon-btn del" onclick="delDish(${day},${i})">✕</button>
     </div>`).join("");
  const empty = week[day].length === 0
    ? `<div class="footer-tip" style="text-align:left;margin:0 4px 8px">还没有菜，下面加一道吧</div>` : "";
  return `<button class="backbar" onclick="closeDay()">‹ 一周晚餐</button>
    <h1>${WEEK[day]}</h1>
    <div class="section-label">菜单</div>
    ${empty}${rows}
    <div class="section-label">添加</div>
    <div class="add-row">
      <input class="dish" id="addInput" placeholder="输入一道菜，回车添加">
      <button class="icon-btn add" id="addBtn" disabled>＋</button>
    </div>`;
}

function bindEdit(day) {
  document.querySelectorAll('input.dish[data-i]').forEach(inp => {
    inp.addEventListener("input", () => {
      week[day][+inp.dataset.i] = inp.value;
      save();
    });
  });
  const add = document.getElementById("addInput");
  const btn = document.getElementById("addBtn");
  const refresh = () => btn.disabled = add.value.trim() === "";
  add.addEventListener("input", refresh);
  const doAdd = () => {
    const t = add.value.trim();
    if (!t) return;
    week[day].push(t); save();
    render();
    document.getElementById("addInput").focus();
  };
  add.addEventListener("keydown", e => { if (e.key === "Enter") doAdd(); });
  btn.addEventListener("click", doAdd);
}

function openDay(i){ editingDay = i; render(); }
function closeDay(){ editingDay = null; render(); }
function delDish(day, i){ week[day].splice(i, 1); save(); render(); }

document.querySelectorAll(".tab").forEach(b =>
  b.addEventListener("click", () => { tab = b.dataset.tab; editingDay = null; render(); }));

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () =>
    navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
